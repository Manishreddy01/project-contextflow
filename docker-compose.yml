services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aurora-backend
    env_file:
      - ./backend/.env
    environment:
      # Backend talks to Qdrant *inside* the Docker network
      QDRANT_URL: http://qdrant:6333
      # Let CORS allow the browser at localhost:5173
      FRONTEND_ORIGIN: http://localhost:5173
      # Rest (OPENROUTER_API_KEY, TAVILY_API_KEY, GOOGLE_CLIENT_ID, etc.)
      # come from backend/.env via env_file above
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aurora-frontend
    ports:
      - "5173:80"
    environment:
      # This value ends up in browser JS, so it MUST be reachable from the browser
      - VITE_BACKEND_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
